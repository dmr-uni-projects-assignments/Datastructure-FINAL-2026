plugins {
    id 'java'
    id 'application'
}

group = 'com.jjs.game'
version = '1.0.0'

repositories {
    mavenCentral()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'com.jjs.game.Main'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.jjs.game.Main'
        )
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
